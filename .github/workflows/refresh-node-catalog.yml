name: Refresh node catalog

on:
  schedule:
    # 04:00 UTC on the 1st of each month. Built-in node display names change
    # slowly, so monthly is plenty.
    - cron: '0 4 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest n8n-nodes-base
        id: pack
        run: |
          cd /tmp
          npm pack n8n-nodes-base@latest
          tar -xzf n8n-nodes-base-*.tgz
          echo "version=$(node -p "require('/tmp/package/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Regenerate bundled.json
        run: node scripts/generate-node-catalog.mjs /tmp/package

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/node-catalog
          commit-message: "chore(catalog): refresh node names to n8n-nodes-base ${{ steps.pack.outputs.version }}"
          title: "chore(catalog): refresh node names to n8n-nodes-base ${{ steps.pack.outputs.version }}"
          body: |
            Automated refresh of `server/catalog/bundled.json` from
            `n8n-nodes-base@${{ steps.pack.outputs.version }}`.

            Generated by `scripts/generate-node-catalog.mjs`. Review the diff and merge.
          add-paths: server/catalog/bundled.json
          delete-branch: true
